name: brdeploy-test-app

services:
  secret-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: brdeploy-test-secret-api:local
    env_file: .env
    ports:
      - "${APP_PORT}:8080"
    volumes:
      - secret-api-data:/app/data
    restart: unless-stopped

volumes:
  secret-api-data:
    driver: local
